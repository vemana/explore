<!DOCTYPE html>
<html>
<head>
    <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.

      For more details:
      * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

      This is a placeholder for base href that will be replaced by the value of
      the `--base-href` argument provided to `flutter build`.
    -->
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta content="A new Flutter project." name="description">

    <!-- iOS meta tags & icons -->
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="black" name="apple-mobile-web-app-status-bar-style">
    <meta content="galtonboard" name="apple-mobile-web-app-title">
    <link href="icons/Icon-192.png" rel="apple-touch-icon">

    <!-- Favicon -->
    <link href="favicon.png" rel="icon" type="image/png"/>

    <title>galtonboard</title>
    <link href="manifest.json" rel="manifest">
    <style>
        .loading {
            height: 100vh;
            width: 100vw;
            margin: 0px;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader {
          background-color: black;
          border: 8px solid blue;
          border-radius: 50%;
          border-top: 30px solid #69F0AE;
          border-right: 30px solid #000000;
          border-bottom: 30px solid #000000;
          border-left: 30px solid #000000;
          position: absolute;
          top: 40%;
          left: 40%;
          width: 200px !important;
          height: 200px !important;
          margin: auto;
          -webkit-animation: spin 2s linear infinite;
          animation: spin 2s linear infinite;
        }

        @-webkit-keyframes spin {
          0% {
            -webkit-transform: rotate(0deg);
          }
          100% {
            -webkit-transform: rotate(360deg);
          }
        }

        @keyframes spin {
          0% {
            transform: rotate(0deg);
          }
          100% {
            transform: rotate(360deg);
          }
        }
    </style>
</head>
<body>
<div class="loading" id="loading">
    <div class="loader"></div>
</div>
<script async src="flutter_bootstrap.js"></script>
</body>
</html>
